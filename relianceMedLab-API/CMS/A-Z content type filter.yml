info:
  name: A-Z content type filter
  type: http
  seq: 1

http:
  method: GET
  url: "{{cms_url}}/api/alphabet-filter/glossary"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: form-urlencoded

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
