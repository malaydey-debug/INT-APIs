info:
  name: Track Visit Details (along sample info)
  type: http
  seq: 1

http:
  method: POST
  url: "{{lupin_be}}/api/v2/booking/track_visit_details"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer <LIMS_TOKEN_HERE>
    - name: Cookie
      value: connect.sid=<SESSION_COOKIE>
  body:
    type: json
    data: |-
      {
        "VisitNo": "LNRL2129"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

