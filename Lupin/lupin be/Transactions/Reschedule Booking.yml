info:
  name: Reschedule Booking
  type: http
  seq: 2

http:
  method: POST
  url: "{{lupin_be}}/api/v1/transaction/reschedule-booking"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer <LIMS_TOKEN_HERE>
  body:
    type: json
    data: |-
      {
        "SlotID": "9_06:30",
        "NewAppDate": "28-Jan-2026 06:30",
        "PrebookingID": "2173",
        "Client": "Website"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

