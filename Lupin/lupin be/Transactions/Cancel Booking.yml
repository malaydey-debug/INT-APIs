info:
  name: Cancel Booking
  type: http
  seq: 1

http:
  method: POST
  url: "{{lupin_be}}/api/v1/transaction/cancel-booking"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer <LIMS_TOKEN_HERE>
  body:
    type: json
    data: |-
      {
        "Client": "Website",
        "PrebookingID": "357839",
        "CancelRemarks": "Cacnel this for testing of custom package"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

