info:
  name: Center Listing Master
  type: http
  seq: 1

http:
  method: POST
  url: "{{lupin_be}}/api/v2/centre"
  headers:
    - name: Accept
      value: application/json, text/plain, */*
    - name: Accept-Language
      value: en-GB,en-US;q=0.9,en;q=0.8
    - name: Cache-Control
      value: no-cache
    - name: Connection
      value: keep-alive
    - name: Content-Type
      value: application/json
    - name: Origin
      value: https://preprod.lupindiagnostics.com
      disabled: true
    - name: Pragma
      value: no-cache
    - name: Referer
      value: https://preprod.lupindiagnostics.com/
      disabled: true
    - name: Sec-Fetch-Dest
      value: empty
    - name: Sec-Fetch-Mode
      value: cors
    - name: Sec-Fetch-Site
      value: same-site
    - name: User-Agent
      value: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/142.0.0.0 Safari/537.36
    - name: sec-ch-ua
      value: '"Chromium";v="142", "Google Chrome";v="142", "Not_A Brand";v="99"'
    - name: sec-ch-ua-mobile
      value: ?0
    - name: sec-ch-ua-platform
      value: '"Windows"'
    - name: Authorization
      value: Bearer a2499748-9486-4a0b-8996-50d6ea6eb28b
  body:
    type: json
    data: "{\r

      \    // \"latitude\": 74.75025,\r

      \    // \"longitude\": 20.891387,\r

      \    // \"radius\": 400,\r

      \    \"centre_codes\": [\"SL0001\"]\r

      \    // \"state_id\": 19,\r

      \    // \"city_id\": 285,\r

      \    // \"type\": \"centre\" // centre, lab\r

      \    // \"pincode\": \"100011\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
