      value: application/json, text/plain, */*
    - name: Accept-Language
      value: en-GB,en-US;q=0.9,en;q=0.8
    - name: Cache-Control
      value: no-cache
    - name: Connection
      value: keep-alive
    - name: Content-Type
      value: application/json
    - name: Origin
      value: https://preprod.lupindiagnostics.com
      disabled: true
    - name: Pragma
      value: no-cache
    - name: Referer
      value: https://preprod.lupindiagnostics.com/
      disabled: true
    - name: Sec-Fetch-Dest
      value: empty
    - name: Sec-Fetch-Mode
      value: cors
