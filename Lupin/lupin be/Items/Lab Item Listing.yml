info:
  name: Lab Item Listing
  type: http
  seq: 3

http:
  method: POST
  url: "{{lupin_be}}/api/v2/item/lab_item"
  headers:
    - name: Accept
      value: application/json, text/plain, */*
    - name: Accept-Language
      value: en-GB,en-US;q=0.9,en;q=0.8
    - name: Cache-Control
      value: no-cache
    - name: Connection
      value: keep-alive
    - name: Content-Type
      value: application/json
    - name: Origin
      value: https://preprod.lupindiagnostics.com
      disabled: true
    - name: Pragma
      value: no-cache
    - name: Referer
      value: https://preprod.lupindiagnostics.com/
      disabled: true
    - name: Sec-Fetch-Dest
      value: empty
    - name: Sec-Fetch-Mode
      value: cors
    - name: Sec-Fetch-Site
      value: same-site
    - name: User-Agent
      value: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/142.0.0.0 Safari/537.36
    - name: sec-ch-ua
      value: '"Chromium";v="142", "Google Chrome";v="142", "Not_A Brand";v="99"'
    - name: sec-ch-ua-mobile
      value: ?0
    - name: sec-ch-ua-platform
      value: '"Windows"'
  body:
    type: json
    data: "{\r

      \    \"sort_by\": {\r

      \        \"price\": \"asc\"\r

      \    },\r

      \    \"filter_by\": {\r

      \        \"department\": \"IMMUNOHISTOCHEMISTRY\",\r

      \        \"centre_code\": \"NRL0001\"\r

      \    },\r

      \    \"page\": 0,\r

      \    \"count\": 10\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
