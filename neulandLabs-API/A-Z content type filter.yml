info:
  name: A-Z content type filter
  type: http
  seq: 3

http:
  method: GET
  url: "{{backend_url}}/api/en/taxo-vocabulary-data/people_category"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{access_token}}
  body:
    type: form-urlencoded

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
